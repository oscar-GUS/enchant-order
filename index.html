<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enchant Order — MineLite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="title-group">
      <h1>Enchant Order</h1>
      <span>Orden óptimo para el yunque · Java Edition 1.21</span>
    </div>
    <div class="lang-toggle" id="lang-toggle">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="es">ES</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div>
        <div class="section-label">Objeto</div>
        <div class="item-grid" id="item-grid"></div>
      </div>

      <div class="enchant-section">
        <div class="section-label">
          Encantamientos
          <button class="clear-btn" id="clear-btn">Limpiar</button>
        </div>
        <div class="enchant-list" id="enchant-list"></div>
      </div>
    </aside>

    <main class="stage" id="stage"></main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
